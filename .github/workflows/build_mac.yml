name: Build Meat Beats
on:
  workflow_dispatch:
  push:
    branches:
      - develop
jobs:
  ci_macos:
    runs-on: macos-latest
    steps:
      - name: Check Xcode version
        run: |
          xcodebuild -version
          xcode-select -p
      - name: Checkout HISE repository
        uses: actions/checkout@v4
        with:
          ref: 'develop'
      - name: Build & Upload HISE.app
        working-directory: ${{ github.workspace }}/tools/auto_build/
        run: sh ./build_mac.sh
      - name: Upload HISE.app
        uses: actions/upload-artifact@v4
        with:
          name: HISE.app
          path: ${{ github.workspace }}/projects/standalone/Builds/MacOSX/build/CI/HISE.app
